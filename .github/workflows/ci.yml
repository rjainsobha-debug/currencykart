name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/currencykart_ci
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-value-at-least-32-characters-long
      OTP_PROVIDER: placeholder
      EMAIL_PROVIDER: placeholder
      PAYMENT_PROVIDER: placeholder
      STORAGE_DRIVER: placeholder
      WHATSAPP_PROVIDER: placeholder
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_BRAND_NAME: CurrencyKart
      NEXT_PUBLIC_DOMAIN: localhost
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run env:validate
      - run: npm run prisma:generate
      - run: npm run workflow:validate
      - run: npm run build
